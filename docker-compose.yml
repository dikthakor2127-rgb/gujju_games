version: '3.8'

services:
  # Flask Web Application
  web:
    build: .
    container_name: gujju-games-web
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      FLASK_SECRET_KEY: gujju-games-docker-secret
      DB_HOST: mysql
      DB_USER: gujju_user
      DB_PASSWORD: gujju_password_123
      DB_NAME: gujju_games
      PORT: 5000
    depends_on:
      - mysql
    volumes:
      - ./:/app
    networks:
      - gujju-network
    command: gunicorn app:app --bind 0.0.0.0:5000 --workers 4 --reload

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: gujju-games-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_USER: gujju_user
      MYSQL_PASSWORD: gujju_password_123
      MYSQL_DATABASE: gujju_games
    ports:
      - "3306:3306"
    volumes:
      - ./gujju_games.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql_data:/var/lib/mysql
    networks:
      - gujju-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

networks:
  gujju-network:
    driver: bridge
