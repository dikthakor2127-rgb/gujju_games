<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Gujju Games</title>

    <link rel="icon" href="{{ url_for('static', filename='images/LOGO.jpeg') }}" type="image/x-icon">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #08101e, #101d33, #1b2846);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .login-box {
            width: 420px;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(14px);
            padding: 35px;
            border-radius: 18px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.35);
            border: 1px solid rgba(255,255,255,0.12);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
            color: #ff7043;
            font-size: 28px;
        }

        label {
            display: block;
            margin-bottom: 7px;
            color: #cbd5e1;
            font-weight: bold;
        }

        input {
            width: 100%;
            padding: 13px;
            margin-bottom: 18px;
            border: none;
            border-radius: 10px;
            background: rgba(255,255,255,0.12);
            color: white;
            font-size: 15px;
            outline: none;
        }

        input::placeholder {
            color: #94a3b8;
        }

        button {
            width: 100%;
            padding: 13px;
            border: none;
            border-radius: 10px;
            background: #ff7043;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #ff5722;
        }

        .links {
            text-align: center;
            margin-top: 18px;
        }

        .links a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: bold;
        }

        .note {
            text-align: center;
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>

    <div class="login-box">
        <h2>🎮 Gujju Games Login</h2>

        <p class="note">User and Admin both can login from here</p>

        <form method="POST" action="{{ url_for('login') }}">
            <label>Username</label>
            <input type="text" name="Username" placeholder="Enter username" required>

            <label>Password</label>
            <input type="password" name="Password" placeholder="Enter password" required>

            <button type="submit">Login</button>
        </form>

        <div class="links">
            <p>New User? <a href="{{ url_for('registration') }}">Register Here</a></p>
        </div>
    </div>

</body>
</html>
