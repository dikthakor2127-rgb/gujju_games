<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title> Tic Tac Toe</title>

<style>
:root {
  --bg: #06030e;
  --cyan: #00f3ff;
  --pink: #ff007f;
  --purple: #7f00ff;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: radial-gradient(circle at center, #180a2b 0%, var(--bg) 100%);
  color: #fff;
  overflow: hidden;
}

.home-btn {
  position: absolute;
  top: 30px;
  left: 30px;
  background: rgba(0, 243, 255, 0.05);
  border: 2px solid var(--cyan);
  color: #fff;
  padding: 8px 24px;
  border-radius: 50px;
  font-weight: bold;
  font-size: 14px;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.4), inset 0 0 10px rgba(0, 243, 255, 0.1);
  letter-spacing: 1px;
  transition: 0.2s;
}

.home-btn:hover {
  box-shadow: 0 0 25px var(--cyan);
  background: rgba(0, 243, 255, 0.15);
}

h1 {
  font-size: 3.5rem;
  font-weight: 800;
  color: #fff;
  text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan), 0 0 40px rgba(0, 243, 255, 0.6);
  margin: 0 0 10px 0;
  letter-spacing: 2px;
}

.status {
  margin-bottom: 25px;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 0.5px;
}

.turn-x {
  color: var(--cyan);
  text-shadow: 0 0 12px var(--cyan);
}

.turn-o {
  color: var(--pink);
  text-shadow: 0 0 12px var(--pink);
}

.board {
  position: relative;
  display: grid;
  grid-template-columns: repeat(3, 110px);
  grid-template-rows: repeat(3, 110px);
  gap: 15px;
  padding: 20px;
  background: #090514;
  border: 2px solid var(--purple);
  box-shadow: 0 0 25px rgba(127, 0, 255, 0.45), inset 0 0 15px rgba(127, 0, 255, 0.2);
  border-radius: 24px;
}

.cell {
  background: #0d081b;
  border: 2px solid #20133a;
  border-radius: 18px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 3.8rem;
  font-weight: 300;
  cursor: pointer;
  transition: all 0.25s ease;
  user-select: none;
}

.cell.x {
  border-color: var(--cyan);
  color: #fff;
  text-shadow: 0 0 10px var(--cyan), 0 0 20px var(--cyan);
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.35), inset 0 0 10px rgba(0, 243, 255, 0.15);
}

.cell.o {
  border-color: var(--pink);
  color: #fff;
  text-shadow: 0 0 10px var(--pink), 0 0 20px var(--pink);
  box-shadow: 0 0 15px rgba(255, 0, 127, 0.35), inset 0 0 10px rgba(255, 0, 127, 0.15);
}

.win-line {
  position: absolute;
  height: 6px;
  width: 0;
  background: #fff;
  box-shadow: 0 0 12px var(--cyan), 0 0 25px var(--cyan), 0 0 35px #fff;
  transform-origin: left center;
  border-radius: 10px;
  z-index: 10;
  pointer-events: none;
  transition: width 0.4s ease-out;
}

.reset-btn {
  margin-top: 35px;
  padding: 14px 45px;
  border: 2px solid var(--pink);
  border-radius: 50px;
  cursor: pointer;
  background: transparent;
  color: #fff;
  font-weight: bold;
  font-size: 16px;
  letter-spacing: 1px;
  box-shadow: 0 0 15px rgba(255, 0, 127, 0.4), inset 0 0 10px rgba(255, 0, 127, 0.1);
  text-transform: uppercase;
  transition: 0.2s ease;
}

.reset-btn:hover {
  background: rgba(255, 0, 127, 0.1);
  box-shadow: 0 0 25px var(--pink);
}

/* MODE SELECTION MODAL */
.mode-modal {
  display: flex;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.9);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

.mode-modal.hidden {
  display: none;
}

.mode-container {
  text-align: center;
  background: #090514;
  border: 2px solid var(--purple);
  border-radius: 24px;
  padding: 40px;
  box-shadow: 0 0 40px rgba(127, 0, 255, 0.6);
  max-width: 500px;
}

.mode-container h2 {
  font-size: 2rem;
  color: #fff;
  text-shadow: 0 0 10px var(--cyan);
  margin-bottom: 30px;
}

.mode-buttons {
  display: flex;
  gap: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

.mode-btn {
  padding: 16px 32px;
  border: 2px solid var(--cyan);
  border-radius: 50px;
  background: transparent;
  color: #fff;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
  transition: 0.3s;
  letter-spacing: 1px;
}

.mode-btn:hover {
  background: rgba(0, 243, 255, 0.15);
  box-shadow: 0 0 25px var(--cyan);
  transform: scale(1.05);
}

.mode-btn.computer {
  border-color: var(--pink);
  box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
}

.mode-btn.computer:hover {
  background: rgba(255, 0, 127, 0.15);
  box-shadow: 0 0 25px var(--pink);
}

.modal-home-btn {
  margin-top: 16px;
  padding: 10px 20px;
  font-size: 0.95rem;
  font-weight: bold;
  color: white;
  background: rgba(255, 255, 255, 0.1);
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.modal-home-btn:hover {
  background: rgba(255, 255, 255, 0.2);
  border-color: rgba(255, 255, 255, 0.5);
  transform: translateY(-1px);
}
</style>
</head>

<body>

<div class="mode-modal" id="modeModal">
  <div class="mode-container">
    <h2>🎮 Choose Game Mode</h2>
    <div class="mode-buttons">
      <button class="mode-btn" onclick="startGame('player')">👥 Play with Player</button>
      <button class="mode-btn computer" onclick="startGame('computer')">🤖 Play with Computer</button>
    </div>
    <button class="modal-home-btn" onclick="window.location='/dashboard'">🏠 Home</button>
  </div>
</div>

<button class="home-btn" onclick="window.location='/dashboard'">HOME</button>

<h1>TIC TAC TOE</h1>
<div class="status turn-x" id="status">Player X's Turn</div>

<div class="board" id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>

  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>

  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>

  <div class="win-line" id="winLine"></div>
</div>

<button class="reset-btn" onclick="resetGame()">Reset Game</button>

<script>
const cells = document.querySelectorAll(".cell");
const statusText = document.getElementById("status");
const winLine = document.getElementById("winLine");
const modeModal = document.getElementById("modeModal");

let current = "X";
let state = ["","","","","","","","",""];
let active = true;
let gameMode = null; // 'player' or 'computer'
let computerPlaying = false;

const wins = [
  [0,1,2],
  [3,4,5],
  [6,7,8],
  [0,3,6],
  [1,4,7],
  [2,5,8],
  [0,4,8],
  [2,4,6]
];

function startGame(mode) {
  gameMode = mode;
  modeModal.classList.add('hidden');
  resetGame();
  
  if (gameMode === 'computer') {
    statusText.textContent = "You (X) vs Computer (O)";
  } else {
    statusText.textContent = "Player X vs Player O";
  }
}

function saveHistory(result, score) {
  fetch('/save_history', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/x-www-form-urlencoded'
    },
    body: `game_name=Tic Tac Toe&result=${encodeURIComponent(result)}&score=${encodeURIComponent(score)}`
  })
  .then(response => response.json())
  .then(data => console.log('History saved:', data))
  .catch(err => console.log('History save failed:', err));
}

function saveScore(gameName, score) {
  fetch("/save-score", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      game_name: gameName,
      score: score
    })
  })
  .then(response => response.json())
  .then(data => console.log("Leaderboard saved:", data))
  .catch(error => console.log("Score save error:", error));
}

function saveGameResult(result, score) {
  saveHistory(result, score);
  saveScore("Tic Tac Toe", score);
}

cells.forEach(c => {
  c.addEventListener("click", () => play(c));
});

function play(cell) {
  const i = cell.dataset.i;

  if (state[i] || !active || computerPlaying) return;

  state[i] = current;
  cell.textContent = current;
  cell.classList.add(current.toLowerCase());

  checkWin();

  if (active) {
    current = current === "X" ? "O" : "X";
    
    if (gameMode === 'computer' && current === "O") {
      statusText.textContent = "Computer is thinking...";
      statusText.className = "status turn-o";
      computerPlaying = true;
      setTimeout(computerMove, 800);
    } else {
      statusText.textContent = (gameMode === 'computer' ? 'Your Turn' : 'Player ' + current + "'s Turn");
      statusText.className = current === "X" ? "status turn-x" : "status turn-o";
    }
  }
}

function computerMove() {
  const bestMove = getBestMove();
  
  if (bestMove !== -1) {
    state[bestMove] = "O";
    const cell = document.querySelector(`[data-i="${bestMove}"]`);
    cell.textContent = "O";
    cell.classList.add("o");

    checkWin();

    if (active) {
      current = "X";
      computerPlaying = false;
      statusText.textContent = "Your Turn";
      statusText.className = "status turn-x";
    }
  }
}

function getBestMove() {
  // Try to win
  for (let i = 0; i < 9; i++) {
    if (!state[i]) {
      state[i] = "O";
      if (checkWinner("O")) {
        state[i] = "";
        return i;
      }
      state[i] = "";
    }
  }

  // Block player from winning
  for (let i = 0; i < 9; i++) {
    if (!state[i]) {
      state[i] = "X";
      if (checkWinner("X")) {
        state[i] = "";
        return i;
      }
      state[i] = "";
    }
  }

  // Take center if available
  if (!state[4]) return 4;

  // Take corners
  const corners = [0, 2, 6, 8];
  const availableCorners = corners.filter(i => !state[i]);
  if (availableCorners.length > 0) {
    return availableCorners[Math.floor(Math.random() * availableCorners.length)];
  }

  // Take any available space
  const available = state.map((val, idx) => val === "" ? idx : null).filter(val => val !== null);
  return available.length > 0 ? available[Math.floor(Math.random() * available.length)] : -1;
}

function checkWinner(player) {
  for (let w of wins) {
    const [a, b, c] = w;
    if (state[a] === player && state[b] === player && state[c] === player) {
      return true;
    }
  }
  return false;
}

function checkWin() {
  for (let w of wins) {
    const [a, b, c] = w;

    if (state[a] && state[a] === state[b] && state[a] === state[c]) {
      drawLine(w);

      if (gameMode === 'computer') {
        statusText.textContent = current === "X" ? "You Win! 🎉" : "Computer Wins!";
      } else {
        statusText.textContent = "Player " + current + " Wins!";
      }
      statusText.className = current === "X" ? "status turn-x" : "status turn-o";

      active = false;

      const result = gameMode === 'computer' ? (current === "X" ? "Win" : "Lose") : `Player ${current} Wins`;
      saveGameResult(result, 1);

      return;
    }
  }

  if (!state.includes("")) {
    statusText.textContent = "Draw!";
    statusText.className = "status";

    active = false;

    saveGameResult("Draw", 0);
  }
}

function drawLine(w) {
  const map = {
    0: [0, 0],
    1: [1, 0],
    2: [2, 0],
    3: [0, 1],
    4: [1, 1],
    5: [2, 1],
    6: [0, 2],
    7: [1, 2],
    8: [2, 2]
  };

  const start = map[w[0]];
  const end = map[w[2]];

  const step = 125;
  const offset = 75;
  const halfCell = 55;

  const x1 = start[0] * step + offset;
  const y1 = start[1] * step + offset;
  const x2 = end[0] * step + offset;
  const y2 = end[1] * step + offset;

  const dx = x2 - x1;
  const dy = y2 - y1;
  const len = Math.hypot(dx, dy);
  const ang = Math.atan2(dy, dx) * 180 / Math.PI;
  const edgeOffset = Math.sqrt(2) * halfCell;

  const startX = x1 - (dx / len) * edgeOffset;
  const startY = y1 - (dy / len) * edgeOffset;
  const width = len + edgeOffset * 2;

  winLine.style.transition = "none";
  winLine.style.transform = `translate(${startX}px, ${startY}px) rotate(${ang}deg)`;

  winLine.offsetHeight;

  winLine.style.transition = "width 0.4s ease-out";
  winLine.style.width = width + "px";
}

function resetGame() {
  state = ["","","","","","","","",""];
  current = "X";
  active = true;
  computerPlaying = false;

  cells.forEach(c => {
    c.textContent = "";
    c.className = "cell";
  });

  winLine.style.width = "0px";
  
  if (gameMode === 'computer') {
    statusText.textContent = "You (X) vs Computer (O) - Your Turn";
    statusText.className = "status turn-x";
  } else if (gameMode === 'player') {
    statusText.textContent = "Player X's Turn";
    statusText.className = "status turn-x";
  } else {
    modeModal.classList.remove('hidden');
    statusText.textContent = "Choose Game Mode";
  }
}
</script>

</body>
</html>
