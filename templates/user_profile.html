<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gujju Games — Profile</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #020617, #111827);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 25px;
      color: white;
    }

    .panel {
      width: 100%;
      max-width: 560px;
      background: rgba(15, 23, 42, 0.95);
      padding: 35px;
      border-radius: 25px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.4);
      border: 1px solid rgba(255,255,255,0.15);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 32px;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 25px;
    }

    .message {
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 18px;
      text-align: center;
      font-weight: bold;
    }

    .success {
      background: rgba(34,197,94,0.18);
      color: #86efac;
      border: 1px solid rgba(34,197,94,0.4);
    }

    .error {
      background: rgba(239,68,68,0.18);
      color: #fecaca;
      border: 1px solid rgba(239,68,68,0.4);
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: #cbd5e1;
      font-size: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.25);
      background: rgba(15, 23, 42, 0.9);
      color: white;
      font-size: 15px;
    }

    input:focus {
      outline: none;
      border-color: #38bdf8;
      box-shadow: 0 0 0 4px rgba(56,189,248,0.12);
    }

    input[readonly] {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 25px;
      flex-wrap: wrap;
    }

    button,
    a {
      flex: 1;
      text-align: center;
      text-decoration: none;
      border: none;
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    button {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      color: white;
    }

    button:hover {
      background: linear-gradient(135deg, #0ea5e9, #0284c7);
    }

    a {
      background: rgba(148,163,184,0.18);
      color: white;
      border: 1px solid rgba(148,163,184,0.25);
    }

    a:hover {
      background: rgba(148,163,184,0.28);
    }

    .hint {
      margin-top: 18px;
      color: #94a3b8;
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="panel">

    <h1>👤 My Profile</h1>
    <p class="subtitle">View and update your account details</p>

    {% if message %}
      <div class="message success">{{ message }}</div>
    {% endif %}

    {% if error %}
      <div class="message error">{{ error }}</div>
    {% endif %}

    <form method="POST">

      {% if user.id %}
      <div class="field">
        <label>User ID</label>
        <input type="text" value="{{ user.id }}" readonly>
      </div>
      {% endif %}

      <div class="field">
        <label>Username</label>
        <input
          type="text"
          name="Username"
          value="{{ user.Username }}"
          required
        >
      </div>

      <div class="field">
        <label>Email</label>
        <input
          type="email"
          name="Email"
          value="{{ user.Email }}"
          required
        >
      </div>

      <div class="field">
        <label>Phone Number</label>
        <input
          type="text"
          name="Phone_number"
          value="{{ user.Phone_number }}"
          required
        >
      </div>

      <div class="field">
        <label>New Password</label>
        <input
          type="password"
          name="Password"
          placeholder="Leave blank to keep current password"
        >
      </div>

      <div class="field">
        <label>Confirm New Password</label>
        <input
          type="password"
          name="Confirm_password"
          placeholder="Repeat new password"
        >
      </div>

      <div class="actions">
        <button type="submit">💾 Save Changes</button>
        <a href="{{ url_for('dashboard') }}">🏠 Back</a>
      </div>

    </form>

    <p class="hint">
      Password update optional che. Blank rakhso to old password same rahse.
    </p>

  </div>

</body>
</html>
